<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Porto & Lagos – MHD Průvodce</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080f1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
    .animate-fade-in { animation: fadeIn 0.22s ease-out both; }
    .spin { display:inline-block; animation: spin 0.7s linear infinite; }
    details > summary { list-style: none; cursor: pointer; user-select: none; }
    details > summary::-webkit-details-marker { display: none; }
    details[open] .details-arrow { transform: rotate(180deg); }
    .pb-safe { padding-bottom: max(env(safe-area-inset-bottom, 12px), 12px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    * { -webkit-tap-highlight-color: transparent; }
    .nearby-dd-opt:first-child { border-radius: 1rem 1rem 0 0; }
    .nearby-dd-opt:last-child  { border-radius: 0 0 1rem 1rem; }

    /* Light Theme Overrides */
    body.light-theme {
      background-color: #f8fafc;
      color: #0f172a;
    }
    body.light-theme #city-app, 
    body.light-theme #city-picker {
      background: #f8fafc !important;
    }
    body.light-theme .bg-slate-900\/60,
    body.light-theme .bg-slate-900\/95,
    body.light-theme .bg-slate-900,
    body.light-theme header,
    body.light-theme nav {
      background-color: #ffffff !important;
      border-color: #e2e8f0 !important;
    }
    body.light-theme .bg-slate-950\/40,
    body.light-theme .bg-slate-950\/30,
    body.light-theme .bg-slate-950 {
      background-color: #f1f5f9 !important;
      border-color: #cbd5e1 !important;
    }
    body.light-theme .bg-slate-800,
    body.light-theme .bg-slate-800\/60 {
      background-color: #e2e8f0 !important;
      border-color: #cbd5e1 !important;
    }
    body.light-theme .bg-slate-850 {
      background-color: #f8fafc !important;
      border-color: #cbd5e1 !important;
    }
    body.light-theme .text-slate-100,
    body.light-theme .text-slate-200 {
      color: #0f172a !important;
    }
    body.light-theme .text-slate-300 {
      color: #334155 !important;
    }
    body.light-theme .text-slate-400 {
      color: #475569 !important;
    }
    body.light-theme .text-slate-500 {
      color: #64748b !important;
    }
    body.light-theme .border-slate-800 {
      border-color: #e2e8f0 !important;
    }
    body.light-theme .border-slate-700 {
      border-color: #cbd5e1 !important;
    }
    body.light-theme input, 
    body.light-theme textarea {
      background-color: #ffffff !important;
      color: #0f172a !important;
      border-color: #cbd5e1 !important;
    }
    body.light-theme input::placeholder, 
    body.light-theme textarea::placeholder {
      color: #94a3b8 !important;
    }
    body.light-theme #city-picker button {
      background: #ffffff !important;
      border-color: #cbd5e1 !important;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
    }
    body.light-theme #city-picker button h2.text-yellow-400 { color: #d97706 !important; }
    body.light-theme #city-picker button h2.text-cyan-400 { color: #0891b2 !important; }
    body.light-theme #city-picker button h2.text-orange-400 { color: #ea580c !important; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .skeleton-pulse {
      animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      background-color: #334155;
      border-radius: 0.375rem;
    }
    body.light-theme .skeleton-pulse {
      background-color: #cbd5e1;
    }
  </style>
</head>
<body class="bg-[#080f1c] text-slate-100 font-sans antialiased">

<!-- ===== CITY PICKER ===== -->
<div id="city-picker" class="min-h-screen flex flex-col pt-safe relative">
  <button onclick="toggleTheme()" id="picker-theme-toggle" class="absolute top-4 right-4 w-10 h-10 flex items-center justify-center rounded-2xl bg-slate-900 border border-slate-800 hover:bg-slate-800 text-slate-300 transition cursor-pointer select-none" title="Změnit režim" aria-label="Přepnout barevný režim">☀️</button>
  <div class="max-w-md mx-auto w-full px-4 py-10 flex-1 flex flex-col">
    <div class="mb-10 text-center">
      <div class="text-5xl mb-4">🧭</div>
      <h1 class="text-2xl font-black text-slate-100">Průvodce cestou</h1>
      <p class="text-sm text-slate-400 mt-1.5">Vyber město pro navigaci</p>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <!-- Porto -->
      <button onclick="renderCity('porto')"
        class="relative overflow-hidden rounded-2xl p-5 text-left cursor-pointer active:scale-95 transition-transform duration-150 aspect-square flex flex-col"
        style="background:linear-gradient(135deg,#1a3055 0%,#0d2240 60%,#070f1e 100%);border:1px solid rgba(251,191,36,0.35)">
        <div class="text-4xl mb-3">🚇</div>
        <h2 class="text-lg font-black text-yellow-400">Porto</h2>
        <p class="text-xs text-slate-400 mt-0.5">MHD Průvodce</p>
        <div class="mt-auto pt-3 flex flex-wrap gap-1">
          <span class="text-[10px] bg-yellow-500/15 text-yellow-300 px-1.5 py-0.5 rounded-full font-bold">Metro</span>
          <span class="text-[10px] bg-yellow-500/15 text-yellow-300 px-1.5 py-0.5 rounded-full font-bold">Autobus</span>
          <span class="text-[10px] bg-yellow-500/15 text-yellow-300 px-1.5 py-0.5 rounded-full font-bold">Andante</span>
        </div>
      </button>
      <!-- Lagos -->
      <button onclick="renderCity('lagos')"
        class="relative overflow-hidden rounded-2xl p-5 text-left cursor-pointer active:scale-95 transition-transform duration-150 aspect-square flex flex-col"
        style="background:linear-gradient(135deg,#082525 0%,#041515 60%,#020a0a 100%);border:1px solid rgba(34,211,238,0.35)">
        <div class="text-4xl mb-3">🏖️</div>
        <h2 class="text-lg font-black text-cyan-400">Lagos</h2>
        <p class="text-xs text-slate-400 mt-0.5">Algarve Průvodce</p>
        <div class="mt-auto pt-3 flex flex-wrap gap-1">
          <span class="text-[10px] bg-cyan-500/15 text-cyan-300 px-1.5 py-0.5 rounded-full font-bold">Pláže</span>
          <span class="text-[10px] bg-cyan-500/15 text-cyan-300 px-1.5 py-0.5 rounded-full font-bold">Bus EVA</span>
          <span class="text-[10px] bg-cyan-500/15 text-cyan-300 px-1.5 py-0.5 rounded-full font-bold">Trajekt</span>
        </div>
      </button>
      <!-- Lisabon -->
      <button onclick="renderCity('lisbon')"
        class="relative overflow-hidden rounded-2xl p-5 text-left cursor-pointer active:scale-95 transition-transform duration-150 aspect-square flex flex-col"
        style="background:linear-gradient(135deg,#1c1008 0%,#120a04 60%,#080401 100%);border:1px solid rgba(249,115,22,0.35)">
        <div class="text-4xl mb-3">🚃</div>
        <h2 class="text-lg font-black text-orange-400">Lisabon</h2>
        <p class="text-xs text-slate-400 mt-0.5">Hlavní město</p>
        <div class="mt-auto pt-3 flex flex-wrap gap-1">
          <span class="text-[10px] bg-orange-500/15 text-orange-300 px-1.5 py-0.5 rounded-full font-bold">Metro 4 linky</span>
          <span class="text-[10px] bg-orange-500/15 text-orange-300 px-1.5 py-0.5 rounded-full font-bold">Tram 28</span>
          <span class="text-[10px] bg-orange-500/15 text-orange-300 px-1.5 py-0.5 rounded-full font-bold">Viva Viagem</span>
        </div>
      </button>
    </div>
    <p class="text-center text-xs text-slate-700 mt-10">Porto MHD PWA · v2.0</p>
  </div>
</div>

<!-- ===== CITY APP ===== -->
<div id="city-app" class="hidden flex flex-col h-dvh overflow-hidden" style="max-width:448px;margin:0 auto">
  <!-- Header -->
  <header id="app-header" class="sticky top-0 z-30 bg-slate-900/95 border-b border-slate-800 backdrop-blur pt-safe px-4 py-3">
    <div class="flex items-center justify-between">
      <button onclick="showCityPicker()" class="flex items-center space-x-2 text-slate-400 hover:text-slate-200 transition cursor-pointer active:scale-90" aria-label="Zpět na výběr města">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        <span class="text-sm font-semibold">Města</span>
      </button>
      <div class="flex items-center space-x-2">
        <span id="city-emoji" class="text-2xl"></span>
        <h1 id="city-name-header" class="text-lg font-black"></h1>
      </div>
      <div class="flex items-center space-x-3">
        <button onclick="toggleTheme()" id="theme-toggle" class="w-8 h-8 flex items-center justify-center rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-300 transition cursor-pointer select-none" title="Změnit režim" aria-label="Přepnout barevný režim">☀️</button>
        <div class="flex items-center space-x-1.5">
          <div id="connection-status" class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></div>
          <span id="connection-status-text" class="text-sm text-green-400 font-semibold">Online</span>
        </div>
      </div>
    </div>
    <div class="flex items-center justify-between mt-1.5">
      <span id="city-time" class="text-sm font-mono text-slate-400"></span>
      <span id="city-date" class="text-sm text-slate-500"></span>
    </div>
  </header>

  <!-- Main content -->
  <main id="app-main" class="flex-1 overflow-y-auto pb-28 px-4 pt-4 space-y-4"></main>

  <!-- Sticky countdown widget (visible across all tabs when timer running) -->
  <div id="sticky-cd" class="hidden fixed z-20 left-0 right-0" style="max-width:448px;margin:0 auto;left:50%;transform:translateX(-50%);width:100%;bottom:calc(56px + env(safe-area-inset-bottom,0px))">
    <div class="mx-3 mb-1 bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">
      <div class="flex items-center gap-3 px-4 py-3">
        <div class="shrink-0">
          <div id="sticky-zone" class="text-xs text-slate-500 font-semibold">Z2 · 60 min</div>
          <div id="sticky-time" class="text-2xl font-black font-mono tabular-nums leading-none" style="color:#34d399">--:--</div>
        </div>
        <div class="flex-1 min-w-0">
          <div class="h-2.5 bg-slate-800 rounded-full overflow-hidden">
            <div id="sticky-bar" class="h-full rounded-full transition-all duration-1000" style="width:100%;background:#34d399"></div>
          </div>
          <div id="sticky-valid" class="text-xs text-slate-500 mt-1 truncate">Jízdenka platí</div>
        </div>
        <button onclick="cancelCountdown()" class="shrink-0 w-8 h-8 flex items-center justify-center text-slate-400 hover:text-red-400 hover:bg-slate-800 rounded-xl transition cursor-pointer text-lg" aria-label="Ukončit odpočet jízdenky">✕</button>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <nav id="app-nav" class="fixed bottom-0 left-0 right-0 z-30 bg-slate-900/95 border-t border-slate-800 backdrop-blur pb-safe" style="max-width:448px;margin:0 auto;left:50%;transform:translateX(-50%);width:100%">
    <div id="tab-buttons" class="flex items-center justify-around px-1 pt-1.5 pb-1"></div>
  </nav>
</div>

<!-- Toast -->
<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-slate-100 text-sm font-semibold px-5 py-3 rounded-2xl shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none max-w-[320px] text-center"></div>

<!-- ===== PLACES MODAL ===== -->
<div id="places-modal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm" onclick="if(event.target===this)closePlacesModal()">
  <div class="absolute inset-x-0 bottom-0 bg-[#080f1c] border-t border-slate-800 rounded-t-2xl overflow-y-auto" style="max-height:90vh;max-width:448px;margin:0 auto;left:50%;transform:translateX(-50%);width:100%">
    <!-- Sticky header -->
    <div class="sticky top-0 bg-[#080f1c] border-b border-slate-800 px-4 py-3 flex items-center justify-between z-10">
      <h2 class="text-sm font-black text-slate-100">📍 Správa míst</h2>
      <button onclick="closePlacesModal()" class="text-slate-400 hover:text-slate-100 transition text-2xl leading-none cursor-pointer select-none" aria-label="Zavřít správu míst">×</button>
    </div>
    <div class="px-4 py-4 space-y-6 pb-safe">

      <!-- Ubytování -->
      <div class="space-y-3">
        <h3 class="text-xs font-extrabold uppercase tracking-wider text-yellow-400">🏠 Ubytování</h3>
        <div class="relative">
          <input id="modal-home-search" type="text" placeholder="Hledat adresu ubytování…"
            oninput="nominatimSearch('modal-home-search','modal-home-results')"
            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:border-yellow-500 transition">
          <div id="modal-home-results" class="hidden absolute left-0 right-0 top-full mt-0.5 bg-slate-800 border border-slate-700 rounded-lg overflow-hidden z-20 shadow-xl max-h-48 overflow-y-auto"></div>
        </div>
        <input id="modal-home-name" type="text" placeholder="Název (např. Hotel Douro)"
          class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-slate-600 transition">
        <input id="modal-home-address" type="text" placeholder="Plná adresa"
          class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-slate-600 transition">
        <div class="grid grid-cols-2 gap-2">
          <input id="modal-home-lat" type="number" step="0.00001" placeholder="Lat (vyplní vyhledávání)"
            class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none">
          <input id="modal-home-lng" type="number" step="0.00001" placeholder="Lng"
            class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none">
        </div>
        <div class="flex gap-2">
          <button onclick="saveHomeSettings()" class="flex-1 bg-yellow-500 hover:bg-yellow-400 active:scale-95 text-slate-950 font-black text-xs py-2.5 rounded-lg transition cursor-pointer">Uložit ubytování</button>
          <button onclick="resetHomeSettings()" class="px-3 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-400 text-xs py-2 rounded-lg transition cursor-pointer">Reset</button>
        </div>
      </div>

      <!-- Přidat místo zájmu -->
      <div class="space-y-3 border-t border-slate-800 pt-5">
        <h3 class="text-xs font-extrabold uppercase tracking-wider text-slate-400">➕ Přidat místo zájmu</h3>
        <div class="relative">
          <input id="modal-poi-search" type="text" placeholder="Hledat místo…"
            oninput="nominatimSearch('modal-poi-search','modal-poi-results')"
            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-xs text-slate-100 placeholder-slate-500 focus:outline-none focus:border-slate-500 transition">
          <div id="modal-poi-results" class="hidden absolute left-0 right-0 top-full mt-0.5 bg-slate-800 border border-slate-700 rounded-lg overflow-hidden z-20 shadow-xl max-h-48 overflow-y-auto"></div>
        </div>
        <div class="flex gap-2">
          <input id="modal-poi-emoji" type="text" placeholder="📍" maxlength="2"
            class="w-14 shrink-0 bg-slate-900 border border-slate-800 rounded-lg px-2 py-2.5 text-sm text-center focus:outline-none">
          <input id="modal-poi-name" type="text" placeholder="Název místa"
            class="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-3 py-2.5 text-xs text-slate-100 placeholder-slate-600 focus:outline-none focus:border-slate-600 transition">
        </div>
        <input id="modal-poi-address" type="text" placeholder="Plná adresa (vyplní vyhledávání)"
          class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-slate-600 transition">
        <div class="grid grid-cols-2 gap-2">
          <input id="modal-poi-lat" type="number" step="0.00001" placeholder="Lat"
            class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none">
          <input id="modal-poi-lng" type="number" step="0.00001" placeholder="Lng"
            class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none">
        </div>
        <button onclick="addPoi()" class="w-full bg-slate-700 hover:bg-slate-600 active:scale-95 text-slate-100 font-bold text-xs py-2.5 rounded-lg transition cursor-pointer">+ Přidat místo</button>
      </div>

      <!-- Uložená místa -->
      <div class="space-y-2 border-t border-slate-800 pt-5">
        <h3 class="text-xs font-extrabold uppercase tracking-wider text-slate-400">🗂️ Uložená místa</h3>
        <div id="modal-poi-list" class="space-y-2"></div>
      </div>

      <!-- Záloha dat -->
      <div class="space-y-3 border-t border-slate-800 pt-5">
        <h3 class="text-xs font-extrabold uppercase tracking-wider text-slate-500">💾 Zálohování dat</h3>
        <div class="flex gap-2">
          <button onclick="exportBackup()"
                  class="flex-1 py-2.5 px-3 bg-slate-850 hover:bg-slate-800 border border-slate-700/60 rounded-xl text-xs font-bold text-slate-300 transition active:scale-95 cursor-pointer text-center">
            📥 Exportovat data
          </button>
          <label class="flex-1 py-2.5 px-3 bg-slate-850 hover:bg-slate-800 border border-slate-700/60 rounded-xl text-xs font-bold text-slate-300 transition active:scale-95 cursor-pointer text-center select-none">
            📤 Importovat data
            <input type="file" accept=".json" class="hidden" onchange="importBackup(this)">
          </label>
        </div>
      </div>
    </div>
  </div>
</div>

function renderTabContent(tabId, city) {
  switch(tabId) {
    case 'overview':  return renderOverview(city);
    case 'routes':    return renderRoutes(city);
    case 'info':      return renderInfo(city);
    case 'beaches':   return renderBeaches(city);
    case 'map':       return renderMap(city);
    case 'wallet':    return renderWallet(city);
    case 'transport': return renderTransport(city);
    default: return '';
  }
}

function renderRouteCard(route, city) {
  const warning = route.warning
    ? `<div class="text-sm text-red-400 font-bold bg-red-950/30 border border-red-900/40 rounded-xl px-4 py-3">${route.warning}</div>`
    : '';
  const btn1 = route.mapsUrl
    ? `<a href="${route.mapsUrl}" target="_blank" class="flex-1 flex items-center justify-center gap-2 py-3 px-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-sm font-bold transition cursor-pointer" style="color:${city.color}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        <span>${route.mapsLabel || 'Google Maps'}</span>
       </a>` : '';
  const btn2 = route.mapsUrl2
    ? `<a href="${route.mapsUrl2}" target="_blank" class="flex-1 flex items-center justify-center gap-2 py-3 px-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-sm font-bold transition cursor-pointer" style="color:${city.color}">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        <span>${route.mapsLabel2}</span>
       </a>` : '';
  const btns = (btn1 || btn2) ? `<div class="flex gap-2 flex-wrap">${btn1}${btn2}</div>` : '';

  // Distance badges
  let distBadges = '';
  if (route.lat && route.lng && typeof haversineM === 'function') {
    const home = PlacesManager.loadHome(city.id);
    const gps = typeof window.getGpsPos === 'function' ? window.getGpsPos() : null;
    const parts = [];
    if (home && home.lat && home.lng) {
      const km = (haversineM(home.lat, home.lng, route.lat, route.lng) / 1000).toFixed(1);
      parts.push(`<span class="text-[10px] text-slate-400 bg-slate-800/60 px-2 py-0.5 rounded-lg font-mono">🏠 ${km} km</span>`);
    }
    if (gps && gps.lat && gps.lng) {
      const km = (haversineM(gps.lat, gps.lng, route.lat, route.lng) / 1000).toFixed(1);
      parts.push(`<span class="text-[10px] text-slate-400 bg-slate-800/60 px-2 py-0.5 rounded-lg font-mono">📍 ${km} km</span>`);
    }
    if (parts.length > 0) {
      distBadges = `<div class="flex gap-1.5 flex-wrap">${parts.join('')}</div>`;
    }
  }

  const shareTitle = `${route.from} → ${route.to}`;
  const shareText = `${route.from} → ${route.to} (${route.badge}, ${route.duration}): ${route.description}`;
  const shareUrl = route.mapsUrl || '';

  return `
    <div class="bg-slate-900/60 p-5 rounded-2xl border border-slate-800 space-y-3">
      <div class="flex items-start justify-between gap-3">
        <div>
          <div class="flex items-center gap-2 flex-wrap">
            <span class="text-sm font-bold text-slate-400">${route.from}</span>
            <svg class="w-4 h-4 text-slate-600 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
            <span class="text-lg font-black text-slate-100">${route.to}</span>
          </div>
          <div class="flex items-center gap-2 flex-wrap mt-1.5">
            <span class="text-xs font-bold px-2.5 py-1 rounded-full inline-block" style="background:${route.badgeColor}25;color:${route.badgeColor}">${route.badge}</span>
            ${distBadges}
          </div>
        </div>
        <span class="text-base font-black shrink-0" style="color:${city.color}">${route.duration}</span>
      </div>
      <p class="text-sm text-slate-400 leading-relaxed">${route.description}</p>
      ${warning}
      ${btns}
      <div class="flex border-t border-slate-800/60 pt-2 mt-2">
        <button data-copy="${(route.from + ' → ' + route.to + ' (' + route.badge + ', ' + route.duration + '): ' + route.description).replace(/"/g, '&quot;')}"
          onclick="copyToClipboard(this.dataset.copy)"
          class="flex-1 flex items-center justify-center gap-1.5 py-2 text-xs text-slate-600 hover:text-slate-400 transition cursor-pointer select-none">
          <span>📋</span><span>Kopírovat</span>
        </button>
        <div class="w-px bg-slate-800/60 my-1"></div>
        <button onclick="shareLink('${shareTitle.replace(/'/g, "\\'")}', '${shareText.replace(/'/g, "\\'")}', '${shareUrl.replace(/'/g, "\\'")}')"
          class="flex-1 flex items-center justify-center gap-1.5 py-2 text-xs text-slate-600 hover:text-slate-400 transition cursor-pointer select-none">
          <span>📤</span><span>Sdílet</span>
        </button>
      </div>
    </div>`;
}

          <button onclick="event.stopPropagation();togglePsEdit('${cityId}')"
                  class="text-xs font-bold px-2.5 py-1.5 rounded-lg transition cursor-pointer ${editBtnCls}">
            ${isEdit ? '✓ Hotovo' : '✏️ Upravit'}
          </button>
          ${!isEdit ? chevron : ''}
        </div>
      </summary>
      <div class="px-5 pb-4 pt-3 border-t border-slate-800">
        <div id="ps-photo-progress-${cityId}" class="mb-2 hidden"></div>
        ${spotItems}
        ${addForm}
      </div>
    </details>`;
}

function renderMap(city) {
  const svg = city.id === 'porto' ? PORTO_MAP_SVG : city.id === 'lisbon' ? LISBON_MAP_SVG : LAGOS_MAP_SVG;
  const toggleBtnText = typeof _interactiveMapActive !== 'undefined' && _interactiveMapActive ? '🗺️ Přepnout na schéma metra' : '🗺️ Přepnout na interaktivní mapu (OSM)';
  const staticHidden = typeof _interactiveMapActive !== 'undefined' && _interactiveMapActive ? 'hidden' : '';
  const leafletHidden = typeof _interactiveMapActive !== 'undefined' && _interactiveMapActive ? '' : 'hidden';
  
  return `
    <div class="flex items-center justify-between gap-3 mb-2">
      <h2 class="text-lg font-black text-slate-100">${city.emoji} ${city.mapTitle}</h2>
    </div>
    
    <button id="map-toggle-btn" onclick="toggleInteractiveMap()"
      class="w-full py-2.5 px-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-xs font-bold text-yellow-400 transition cursor-pointer text-center select-none mb-3">
      ${toggleBtnText}
    </button>
    
    <!-- Static SVG Map view -->
    <div id="map-static-view" class="${staticHidden} space-y-2">
      <div class="relative bg-slate-900/60 rounded-xl border border-slate-800 overflow-hidden" style="height:420px">
        <div class="absolute right-2 top-2 z-10 flex flex-col gap-1">
          <button onclick="zoomMap(1.2)" class="w-8 h-8 rounded bg-slate-800 border border-slate-700 font-bold text-slate-100 flex items-center justify-center active:scale-90 cursor-pointer select-none text-lg" aria-label="Přiblížit mapu">+</button>
          <button onclick="zoomMap(0.8)" class="w-8 h-8 rounded bg-slate-800 border border-slate-700 font-bold text-slate-100 flex items-center justify-center active:scale-90 cursor-pointer select-none text-lg" aria-label="Oddálit mapu">−</button>
          <button onclick="resetZoom()" class="w-8 h-8 rounded bg-slate-800 border border-slate-700 text-[10px] font-bold text-slate-100 flex items-center justify-center active:scale-90 cursor-pointer select-none" aria-label="Resetovat přiblížení">RST</button>
        </div>
        <div id="map-container" class="overflow-hidden w-full h-full flex items-center justify-center touch-none">
          <div id="map-svg-wrapper" class="origin-center transition-transform duration-200" style="min-width:540px;min-height:400px">
            ${svg}
          </div>
        </div>
      </div>
      <p class="text-[10px] text-slate-500 italic">${city.mapNote}</p>
    </div>
    
    <!-- Interactive OSM Leaflet Map view -->
    <div id="map-interactive-view" class="${leafletHidden} space-y-2">
      <div id="leaflet-map" class="w-full bg-slate-900/60 rounded-xl border border-slate-800 overflow-hidden" style="height:420px"></div>
      <p class="text-[10px] text-slate-500 italic">Interaktivní mapa zobrazuje ubytování (🏠) a uložená místa (📍).</p>
      <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-3 space-y-2">
        <div class="flex items-center justify-between gap-2">
          <span class="text-xs font-bold text-slate-400">🗺️ Offline mapa</span>
          <button id="offline-tiles-btn" onclick="downloadOfflineTiles()"
            class="text-xs font-bold px-3 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 text-green-400 transition cursor-pointer active:scale-95 select-none">
            ⬇ Uložit mapu offline
          </button>
        </div>
        <p id="offline-tiles-status" class="text-[10px] text-slate-500 leading-relaxed"></p>
      </div>
    </div>`;
}

function renderWallet(city) {
  return `
    <h2 class="text-xl font-black text-slate-100">💳 Andante Peněženka</h2>

    <!-- Z2 -->
    <div id="wallet-z2-card" class="bg-slate-900/60 p-5 rounded-2xl border border-slate-800 space-y-4">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-lg font-black text-slate-100">Zóna Z2</h3>
          <p class="text-sm text-slate-500">1,85 €/jízda · platnost 60 min</p>
        </div>
        <span class="text-sm font-bold px-3 py-1 rounded-full bg-blue-500/20 text-blue-400">Z2</span>
      </div>
      <div class="text-center py-2">
        <div id="wallet-z2-count" class="text-5xl font-black text-slate-100 font-mono tabular-nums">0</div>
        <div id="wallet-z2-eur" class="text-sm text-slate-400 mt-1">≈ 0,00 €</div>
        <div id="wallet-z2-warn" class="hidden text-xs font-bold text-red-400 mt-1"></div>
      </div>
      <div class="flex gap-2">
        <button onclick="changeRides('z2',-1)" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-2xl font-black text-slate-300 cursor-pointer active:scale-95 transition">−</button>
        <button onclick="changeRides('z2',1)"  class="flex-1 py-3 rounded-xl text-2xl font-black text-slate-900 cursor-pointer active:scale-95 transition" style="background:#fbbf24">+</button>
      </div>
    </div>

    <!-- Z4 -->
    <div id="wallet-z4-card" class="bg-slate-900/60 p-5 rounded-2xl border border-slate-800 space-y-4">
      <div class="flex items-center justify-between">
        <div>
          <h3 class="text-lg font-black text-slate-100">Zóna Z4</h3>
          <p class="text-sm text-slate-500">3,00 €/jízda · platnost 75 min</p>
        </div>
        <span class="text-sm font-bold px-3 py-1 rounded-full bg-purple-500/20 text-purple-400">Z4</span>
      </div>
      <div class="text-center py-2">
        <div id="wallet-z4-count" class="text-5xl font-black text-slate-100 font-mono tabular-nums">0</div>
        <div id="wallet-z4-eur" class="text-sm text-slate-400 mt-1">≈ 0,00 €</div>
        <div id="wallet-z4-warn" class="hidden text-xs font-bold text-red-400 mt-1"></div>
      </div>
      <div class="flex gap-2">
        <button onclick="changeRides('z4',-1)" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-2xl font-black text-slate-300 cursor-pointer active:scale-95 transition">−</button>
        <button onclick="changeRides('z4',1)"  class="flex-1 py-3 rounded-xl text-2xl font-black text-slate-900 cursor-pointer active:scale-95 transition" style="background:#fbbf24">+</button>
      </div>
    </div>

    <!-- Countdown -->
    <div class="bg-slate-900/60 p-5 rounded-2xl border border-slate-800 space-y-4">
      <h3 class="text-base uppercase font-extrabold text-yellow-400 tracking-wider">⏱ Platnost jízdenky</h3>
      <div id="countdown-display" class="hidden space-y-4">
        <div class="text-center">
          <div id="countdown-zone-label" class="text-sm text-slate-500 mb-2">Z2 · 60 min</div>
          <div id="countdown-time" class="text-5xl font-black text-center tracking-tight text-emerald-400 font-mono tabular-nums">00:00</div>
          <div id="countdown-valid-until" class="text-sm text-slate-500 mt-2"></div>
        </div>
        <div class="h-3 bg-slate-800 rounded-full overflow-hidden">
          <div id="countdown-bar" class="h-full rounded-full transition-all duration-1000 bg-emerald-500" style="width:100%"></div>
        </div>
        <button onclick="cancelCountdown()" class="w-full py-3 text-sm font-bold text-red-400 hover:text-red-300 transition cursor-pointer border border-red-900/30 rounded-xl">✕ Zrušit odpočet</button>
      </div>
      <div id="countdown-buttons" class="space-y-3">
        <p class="text-sm text-slate-500">Spusť hned po validaci jízdenky:</p>
        <div class="flex gap-3">
          <button onclick="startCountdown('z2')" class="flex-1 py-4 text-sm font-bold rounded-xl bg-blue-900/30 border border-blue-800/50 text-blue-400 hover:bg-blue-900/50 transition cursor-pointer">⏱ Z2 – 60 min</button>
          <button onclick="startCountdown('z4')" class="flex-1 py-4 text-sm font-bold rounded-xl bg-purple-900/30 border border-purple-800/50 text-purple-400 hover:bg-purple-900/50 transition cursor-pointer">⏱ Z4 – 75 min</button>
        </div>
      </div>
    </div>`;
}

function renderTransport(city) {
  const sections = city.transportSections.map(sec => {
    const items = (sec.items || []).map(item => `
      <div class="flex items-start gap-3">
        <span class="font-bold text-sm shrink-0 w-36" style="color:${sec.titleColor}">${item.key}</span>
        <span class="text-sm text-slate-300">${item.value}</span>
      </div>`).join('');
    const linkBtn = sec.linkUrl
      ? `<a href="${sec.linkUrl}" target="_blank"
          class="w-full flex items-center justify-center gap-2 py-3 px-4 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-xl text-sm font-bold transition cursor-pointer" style="color:${sec.titleColor}">
          <span>${sec.linkLabel}</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
         </a>` : '';
    return `
      <div class="bg-slate-900/60 p-5 rounded-2xl border border-slate-800 space-y-4">
        <h3 class="text-sm uppercase font-extrabold tracking-wider" style="color:${sec.titleColor}">${sec.title}</h3>
        ${sec.content ? `<p class="text-sm text-slate-300 leading-relaxed">${sec.content}</p>` : ''}
        ${items ? `<div class="space-y-3 bg-slate-950/30 p-4 rounded-xl">${items}</div>` : ''}
        ${linkBtn}
      </div>`;
  }).join('');
  return `<h2 class="text-xl font-black text-slate-100">🚌 Doprava & Tipy</h2>${sections}`;
}

</script>

<script>
const lastCity = localStorage.getItem('app_last_city');
if (lastCity) {
  setTimeout(() => {
    renderCity(lastCity);
  }, 50);
} else {
  // Update picker theme button on startup
  setTimeout(updateThemeButtons, 50);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
