<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Porto & Lagos – MHD Průvodce</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#080f1c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .animate-fade-in { animation: fadeIn 0.22s ease-out both; }
    details > summary { list-style: none; cursor: pointer; user-select: none; }
    details > summary::-webkit-details-marker { display: none; }
    details[open] .details-arrow { transform: rotate(180deg); }
    .pb-safe { padding-bottom: max(env(safe-area-inset-bottom, 12px), 12px); }
    .pt-safe { padding-top: env(safe-area-inset-top, 0px); }
    * { -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body class="bg-[#080f1c] text-slate-100 font-sans antialiased">

<!-- ===== CITY PICKER ===== -->
<div id="city-picker" class="min-h-screen flex flex-col pt-safe">
  <div class="max-w-md mx-auto w-full px-4 py-10 flex-1 flex flex-col">
    <div class="mb-10 text-center">
      <div class="text-5xl mb-4">🧭</div>
      <h1 class="text-2xl font-black text-slate-100">Průvodce cestou</h1>
      <p class="text-sm text-slate-400 mt-1.5">Vyber město pro navigaci</p>
    </div>
    <div class="grid grid-cols-2 gap-4">
      <!-- Porto -->
      <button onclick="renderCity('porto')"
        class="relative overflow-hidden rounded-2xl p-5 text-left cursor-pointer active:scale-95 transition-transform duration-150"
        style="background:linear-gradient(135deg,#1a3055 0%,#0d2240 60%,#070f1e 100%);border:1px solid rgba(251,191,36,0.35)">
        <div class="text-4xl mb-3">🚇</div>
        <h2 class="text-lg font-black text-yellow-400">Porto</h2>
        <p class="text-xs text-slate-400 mt-0.5">MHD Průvodce</p>
        <div class="mt-3 flex flex-wrap gap-1">
          <span class="text-[10px] bg-yellow-500/15 text-yellow-300 px-1.5 py-0.5 rounded-full font-bold">Metro</span>
          <span class="text-[10px] bg-yellow-500/15 text-yellow-300 px-1.5 py-0.5 rounded-full font-bold">Autobus</span>
          <span class="text-[10px] bg-yellow-500/15 text-yellow-300 px-1.5 py-0.5 rounded-full font-bold">Andante</span>
        </div>
      </button>
      <!-- Lagos -->
      <button onclick="renderCity('lagos')"
        class="relative overflow-hidden rounded-2xl p-5 text-left cursor-pointer active:scale-95 transition-transform duration-150"
        style="background:linear-gradient(135deg,#082525 0%,#041515 60%,#020a0a 100%);border:1px solid rgba(34,211,238,0.35)">
        <div class="text-4xl mb-3">🏖️</div>
        <h2 class="text-lg font-black text-cyan-400">Lagos</h2>
        <p class="text-xs text-slate-400 mt-0.5">Algarve Průvodce</p>
        <div class="mt-3 flex flex-wrap gap-1">
          <span class="text-[10px] bg-cyan-500/15 text-cyan-300 px-1.5 py-0.5 rounded-full font-bold">Pláže</span>
          <span class="text-[10px] bg-cyan-500/15 text-cyan-300 px-1.5 py-0.5 rounded-full font-bold">Bus EVA</span>
          <span class="text-[10px] bg-cyan-500/15 text-cyan-300 px-1.5 py-0.5 rounded-full font-bold">Trajekt</span>
        </div>
      </button>
    </div>
    <p class="text-center text-xs text-slate-700 mt-10">Porto MHD PWA · v2.0</p>
  </div>
</div>

<!-- ===== CITY APP ===== -->
<div id="city-app" class="hidden flex flex-col min-h-screen" style="max-width:448px;margin:0 auto">
  <!-- Header -->
  <header id="app-header" class="sticky top-0 z-30 bg-slate-900/95 border-b border-slate-800 backdrop-blur pt-safe px-4 py-3">
    <div class="flex items-center justify-between">
      <button onclick="showCityPicker()" class="flex items-center space-x-2 text-slate-400 hover:text-slate-200 transition cursor-pointer active:scale-90">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        <span class="text-sm font-semibold">Města</span>
      </button>
      <div class="flex items-center space-x-2">
        <span id="city-emoji" class="text-2xl"></span>
        <h1 id="city-name-header" class="text-lg font-black"></h1>
      </div>
      <div class="flex items-center space-x-1.5">
        <div id="connection-status" class="w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse"></div>
        <span id="connection-status-text" class="text-sm text-green-400 font-semibold">Online</span>
      </div>
    </div>
    <div class="flex items-center justify-between mt-1.5">
      <span id="city-time" class="text-sm font-mono text-slate-400"></span>
      <span id="city-date" class="text-sm text-slate-500"></span>
    </div>
  </header>

  <!-- Main content -->
  <main id="app-main" class="flex-1 overflow-y-auto pb-28 px-4 pt-4 space-y-4"></main>

  <!-- Bottom nav -->
  <nav class="fixed bottom-0 left-0 right-0 z-30 bg-slate-900/95 border-t border-slate-800 backdrop-blur pb-safe" style="max-width:448px;margin:0 auto;left:50%;transform:translateX(-50%);width:100%">
    <div id="tab-buttons" class="flex items-center justify-around px-1 pt-1.5 pb-1"></div>
  </nav>
</div>

<!-- Toast -->
<div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-slate-800 text-slate-100 text-xs font-semibold px-4 py-2 rounded-full shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none whitespace-nowrap"></div>

<!-- ===== PLACES MODAL ===== -->
<div id="places-modal" class="hidden fixed inset-0 z-50 bg-black/70 backdrop-blur-sm" onclick="if(event.target===this)closePlacesModal()">
  <div class="absolute inset-x-0 bottom-0 bg-[#080f1c] border-t border-slate-800 rounded-t-2xl overflow-y-auto" style="max-height:90vh;max-width:448px;margin:0 auto;left:50%;transform:translateX(-50%);width:100%">
    <!-- Sticky header -->
    <div class="sticky top-0 bg-[#080f1c] border-b border-slate-800 px-4 py-3 flex items-center justify-between z-10">
      <h2 class="text-sm font-black text-slate-100">📍 Správa míst</h2>
      <button onclick="closePlacesModal()" class="text-slate-400 hover:text-slate-100 transition text-2xl leading-none cursor-pointer select-none">×</button>
    </div>
    <div class="px-4 py-4 space-y-6 pb-safe">

      <!-- Ubytování -->
      <div class="space-y-3">
        <h3 class="text-xs font-extrabold uppercase tracking-wider text-yellow-400">🏠 Ubytování</h3>
        <div class="relative">
          <input id="modal-home-search" type="text" placeholder="Hledat adresu ubytování…"
            oninput="nominatimSearch('modal-home-search','modal-home-results')"
            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-xs text-slate-100 placeholder-slate-500 focus:outline-none focus:border-yellow-500 transition">
          <div id="modal-home-results" class="hidden absolute left-0 right-0 top-full mt-0.5 bg-slate-800 border border-slate-700 rounded-lg overflow-hidden z-20 shadow-xl max-h-48 overflow-y-auto"></div>
        </div>
        <input id="modal-home-name" type="text" placeholder="Název (např. Hotel Douro)"
          class="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2.5 text-xs text-slate-100 placeholder-slate-600 focus:outline-none focus:border-slate-600 transition">
        <input id="modal-home-address" type="text" placeholder="Plná adresa"
          class="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2.5 text-xs text-slate-100 placeholder-slate-600 focus:outline-none focus:border-slate-600 transition">
        <div class="grid grid-cols-2 gap-2">
          <input id="modal-home-lat" type="number" step="0.00001" placeholder="Lat (vyplní vyhledávání)"
            class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none">
          <input id="modal-home-lng" type="number" step="0.00001" placeholder="Lng"
            class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none">
        </div>
        <div class="flex gap-2">
          <button onclick="saveHomeSettings()" class="flex-1 bg-yellow-500 hover:bg-yellow-400 active:scale-95 text-slate-950 font-black text-xs py-2.5 rounded-lg transition cursor-pointer">Uložit ubytování</button>
          <button onclick="resetHomeSettings()" class="px-3 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-400 text-xs py-2 rounded-lg transition cursor-pointer">Reset</button>
        </div>
      </div>

      <!-- Přidat místo zájmu -->
      <div class="space-y-3 border-t border-slate-800 pt-5">
        <h3 class="text-xs font-extrabold uppercase tracking-wider text-slate-400">➕ Přidat místo zájmu</h3>
        <div class="relative">
          <input id="modal-poi-search" type="text" placeholder="Hledat místo…"
            oninput="nominatimSearch('modal-poi-search','modal-poi-results')"
            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-xs text-slate-100 placeholder-slate-500 focus:outline-none focus:border-slate-500 transition">
          <div id="modal-poi-results" class="hidden absolute left-0 right-0 top-full mt-0.5 bg-slate-800 border border-slate-700 rounded-lg overflow-hidden z-20 shadow-xl max-h-48 overflow-y-auto"></div>
        </div>
        <div class="flex gap-2">
          <input id="modal-poi-emoji" type="text" placeholder="📍" maxlength="2"
            class="w-14 shrink-0 bg-slate-900 border border-slate-800 rounded-lg px-2 py-2.5 text-sm text-center focus:outline-none">
          <input id="modal-poi-name" type="text" placeholder="Název místa"
            class="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-3 py-2.5 text-xs text-slate-100 placeholder-slate-600 focus:outline-none focus:border-slate-600 transition">
        </div>
        <input id="modal-poi-address" type="text" placeholder="Plná adresa (vyplní vyhledávání)"
          class="w-full bg-slate-900 border border-slate-800 rounded-lg px-3 py-2.5 text-xs text-slate-100 placeholder-slate-600 focus:outline-none focus:border-slate-600 transition">
        <div class="grid grid-cols-2 gap-2">
          <input id="modal-poi-lat" type="number" step="0.00001" placeholder="Lat"
            class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none">
          <input id="modal-poi-lng" type="number" step="0.00001" placeholder="Lng"
            class="bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-400 font-mono focus:outline-none">
        </div>
        <button onclick="addPoi()" class="w-full bg-slate-700 hover:bg-slate-600 active:scale-95 text-slate-100 font-bold text-xs py-2.5 rounded-lg transition cursor-pointer">+ Přidat místo</button>
      </div>

      <!-- Uložená místa -->
      <div class="space-y-2 border-t border-slate-800 pt-5">
        <h3 class="text-xs font-extrabold uppercase tracking-wider text-slate-400">🗂️ Uložená místa</h3>
        <div id="modal-poi-list"></div>
      </div>
    </div>
  </div>
</div>

// STATE
// ===========================
let currentCity = null;
let clockInterval = null;

// ===========================
// NAVIGATION
// ===========================
function showCityPicker() {
  document.getElementById('city-picker').classList.remove('hidden');
  document.getElementById('city-app').classList.add('hidden');
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  if (window._cdInterval) { clearInterval(window._cdInterval); window._cdInterval = null; }
  if (window._weatherInterval) { clearInterval(window._weatherInterval); window._weatherInterval = null; }
  if (window.depRefreshTimers) {
    Object.values(window.depRefreshTimers).forEach(t => clearTimeout(t));
    window.depRefreshTimers = {};
  }
}

function renderCity(cityId) {
  const city = CITIES.find(c => c.id === cityId);
  if (!city) return;
  currentCity = city;

  document.getElementById('city-picker').classList.add('hidden');
  document.getElementById('city-app').classList.remove('hidden');

  // Header
  document.getElementById('city-emoji').textContent = city.emoji;
  const nameEl = document.getElementById('city-name-header');
  nameEl.textContent = city.name;
  nameEl.style.color = city.color;

  // Tab buttons
  document.getElementById('tab-buttons').innerHTML = city.tabs.map(tab => `
    <button id="tab-btn-${tab.id}" onclick="switchTab('${tab.id}')"
      class="flex-1 flex flex-col items-center justify-center py-1.5 px-0.5 rounded-lg transition-all duration-150 cursor-pointer select-none"
      style="color:#475569">
      <span class="text-xl leading-none">${tab.icon}</span>
      <span class="text-[11px] font-bold mt-1 leading-none">${tab.label}</span>
    </button>`).join('');

  // Tab content
  document.getElementById('app-main').innerHTML = city.tabs.map(tab => `
    <section id="section-${tab.id}" class="animate-fade-in space-y-4 hidden">
      ${renderTabContent(tab.id, city)}
    </section>`).join('');

  // Init features
  if (city.extras === 'porto') initPorto();
  initMap();
  updateOnlineStatus();

  // Clock
  if (clockInterval) clearInterval(clockInterval);
  updateClock(city);
  clockInterval = setInterval(() => updateClock(city), 1000);

  // Show first tab
  switchTab(city.tabs[0].id);
}

function switchTab(tabId) {
  const city = currentCity;
  if (!city) return;
  city.tabs.forEach(tab => {
    const sec = document.getElementById('section-' + tab.id);
    const btn = document.getElementById('tab-btn-' + tab.id);
    if (!sec || !btn) return;
    if (tab.id === tabId) {
      sec.classList.remove('hidden');
      btn.style.color = city.color;
      btn.style.background = 'rgba(255,255,255,0.07)';
    } else {
      sec.classList.add('hidden');
      btn.style.color = '#475569';
      btn.style.background = '';
    }
  });
}

function renderTabContent(tabId, city) {
  switch(tabId) {
    case 'overview':  return renderOverview(city);
    case 'routes':    return renderRoutes(city);
    case 'info':      return renderInfo(city);
    case 'beaches':   return renderBeaches(city);
    case 'map':       return renderMap(city);
    case 'wallet':    return renderWallet(city);
    case 'transport': return renderTransport(city);
    default: return '';
  }
}

// ===========================
let currentMapZoom = 1, mapTransX = 0, mapTransY = 0;

function applyMapTransform() {
  const w = document.getElementById('map-svg-wrapper');
  if (w) w.style.transform = `scale(${currentMapZoom}) translate(${mapTransX}px,${mapTransY}px)`;
}
function zoomMap(factor) {
  currentMapZoom = Math.min(Math.max(currentMapZoom * factor, 0.4), 3.5);
  applyMapTransform();
}
function resetZoom() {
  currentMapZoom = 1; mapTransX = 0; mapTransY = 0; applyMapTransform();
}
function initMap() {
  currentMapZoom = 1; mapTransX = 0; mapTransY = 0;
  setTimeout(() => {
    const container = document.getElementById('map-container');
    if (!container) return;
    let lastDist = 0, pinching = false;
    let dsx = 0, dsy = 0, dstx = 0, dsty = 0;
    const dist = t => Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
    container.addEventListener('touchstart', e => {
      if (e.touches.length === 2) { lastDist = dist(e.touches); pinching = true; e.preventDefault(); }
      else if (e.touches.length === 1) {
        dsx = e.touches[0].clientX; dsy = e.touches[0].clientY;
        dstx = mapTransX; dsty = mapTransY; pinching = false;
      }
    }, { passive: false });
    container.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && pinching) {
        const d = dist(e.touches);
        currentMapZoom = Math.min(Math.max(currentMapZoom * (d / lastDist), 0.4), 3.5);
        lastDist = d; applyMapTransform(); e.preventDefault();
      } else if (e.touches.length === 1 && !pinching) {
        mapTransX = dstx + (e.touches[0].clientX - dsx) / currentMapZoom;
        mapTransY = dsty + (e.touches[0].clientY - dsy) / currentMapZoom;
        applyMapTransform(); e.preventDefault();
      }
    }, { passive: false });
    container.addEventListener('touchend', () => { pinching = false; });
  }, 100);
}

// PORTO – COUNTDOWN
// ===========================
const COUNTDOWN_MS = { z2: 60 * 60 * 1000, z4: 75 * 60 * 1000 };
let notifTimeouts = [];

function clearNotifTimeouts() {
  notifTimeouts.forEach(clearTimeout);
  notifTimeouts = [];
}

async function scheduleTicketNotifs(zone, startMs) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return;
  }
  if (Notification.permission !== 'granted') return;
  clearNotifTimeouts();
  const duration = COUNTDOWN_MS[zone];
  const now = Date.now();
  const schedule = [
    [duration - 5*60000, '⏱ Jízdenka vyprší za 5 minut!',             [200,100,200],           'ticket-5'],
    [duration -   60000, '🚨 Jízdenka vyprší za 1 minutu! Přestupuj!', [500,200,500,200,500],   'ticket-1'],
    [duration,           '❌ Jízdenka vypršela – pípni znovu.',         [1000],                  'ticket-exp']
  ];
  schedule.forEach(([offset, body, vibrate, tag]) => {
    const delay = startMs + offset - now;
    if (delay > 0) {
      notifTimeouts.push(setTimeout(() => {
        new Notification('Porto MHD', { body, icon:'./icon-192.png', tag });
        if (navigator.vibrate) navigator.vibrate(vibrate);
      }, delay));
    }
  });
}

function startCountdown(zone) {
  const startMs = Date.now();
  localStorage.setItem('porto_mhd_cd_start', startMs);
  localStorage.setItem('porto_mhd_cd_zone', zone);
  scheduleTicketNotifs(zone, startMs);
  renderCountdown();
}

function cancelCountdown() {
  clearNotifTimeouts();
  localStorage.removeItem('porto_mhd_cd_start');
  localStorage.removeItem('porto_mhd_cd_zone');
  renderCountdown();
}

function renderCountdown() {
  const start = parseInt(localStorage.getItem('porto_mhd_cd_start') || '0');
  const zone  = localStorage.getItem('porto_mhd_cd_zone') || 'z2';
  const display = document.getElementById('countdown-display');
  const buttons = document.getElementById('countdown-buttons');
  if (!display || !buttons) return;

  if (!start) {
    display.classList.add('hidden'); buttons.classList.remove('hidden'); return;
  }
  display.classList.remove('hidden'); buttons.classList.add('hidden');

  const duration  = COUNTDOWN_MS[zone];
  const elapsed   = Date.now() - start;
  const remaining = Math.max(0, duration - elapsed);

  const timeEl  = document.getElementById('countdown-time');
  const barEl   = document.getElementById('countdown-bar');
  const labelEl = document.getElementById('countdown-zone-label');
  const untilEl = document.getElementById('countdown-valid-until');
  if (!timeEl) return;

  labelEl.textContent = zone === 'z2' ? 'Z2 · 60 min' : 'Z4 · 75 min';
  barEl.style.width = ((remaining / duration) * 100) + '%';

  if (remaining === 0) {
    timeEl.textContent = 'VYPRŠELA!';
    timeEl.className = 'text-3xl font-black text-center tracking-tight text-red-400 font-mono animate-pulse';
    barEl.className = 'h-full rounded-full bg-red-600';
    untilEl.textContent = 'Jízdenka neplatí — pípni znovu.';
    if (elapsed > duration + 60000) cancelCountdown();
    return;
  }

  const mins = Math.floor(remaining / 60000);
  const secs = Math.floor((remaining % 60000) / 1000);
  timeEl.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');

  if (remaining > 15 * 60000) {
    timeEl.className = 'text-4xl font-black text-center tracking-tight text-emerald-400 font-mono tabular-nums';
    barEl.className = 'h-full rounded-full transition-all duration-1000 bg-emerald-500';
  } else if (remaining > 5 * 60000) {
    timeEl.className = 'text-4xl font-black text-center tracking-tight text-yellow-400 font-mono tabular-nums';
    barEl.className = 'h-full rounded-full transition-all duration-1000 bg-yellow-500';
  } else {
    timeEl.className = 'text-4xl font-black text-center tracking-tight text-red-400 font-mono tabular-nums animate-pulse';
    barEl.className = 'h-full rounded-full transition-all duration-1000 bg-red-500';
  }

  try {
    const validUntil = new Date(start + duration);
    const t = new Intl.DateTimeFormat('cs-CZ', { timeZone:'Europe/Lisbon', hour:'2-digit', minute:'2-digit', hour12:false }).format(validUntil);
    untilEl.textContent = 'Platí do: ' + t + ' (portug. čas)';
  } catch(e) { untilEl.textContent = ''; }
}

const STCP_STOPS = {
  lordelo:    { stops: [{ id:'LRD1',  label:'→ FLUP/Centrum', color:'#10b981' }, { id:'LRD2',  label:'→ Foz/Pláž', color:'#60a5fa' }] },
  planetario: { stops: [{ id:'PLNT1', label:'→ FLUP/Centrum', color:'#10b981' }, { id:'PLNT2', label:'→ Foz/Pláž', color:'#60a5fa' }] }
};
window.depRefreshTimers = {};

async function loadArrivals(key) {
  const config = STCP_STOPS[key];
  const container = document.getElementById('dep-' + key);
  const btn = document.getElementById('dep-btn-' + key);
  if (!container || !btn) return;

  btn.textContent = '⟳'; btn.disabled = true;
  container.classList.remove('hidden');
  container.innerHTML = '<p style="font-size:11px;color:#64748b;text-align:center;padding:8px 0">Načítám odjezdy…</p>';
  clearTimeout(window.depRefreshTimers[key]);

  const results = await Promise.all(
    config.stops.map(stop =>
      fetch('https://proxy.cors.sh/https://stcp.pt/api/stops/' + stop.id + '/realtime', { cache:'no-store' })
        .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
        .then(data => ({ ...stop, arrivals: data.arrivals || [], ok: true }))
        .catch(err => ({ ...stop, arrivals: [], ok: false, err: err.message }))
    )
  );

  const allFailed = results.every(r => !r.ok);
  if (allFailed) {
    container.innerHTML = '<div style="padding:6px 2px;text-align:center"><p style="font-size:11px;color:#f87171">Nepodařilo se načíst (' + (results[0]?.err || 'CORS/síť') + ').</p><p style="font-size:10px;color:#475569;margin-top:4px">Použij záložní odkaz pro otevření STCP webu.</p></div>';
    btn.textContent = '↺ Zkusit znovu'; btn.disabled = false; return;
  }

  const all = [];
  results.forEach(r => r.arrivals.forEach(a => all.push({ ...a, dirLabel: r.label, dirColor: r.color })));
  all.sort((a, b) => a.arrival_minutes - b.arrival_minutes);

  if (all.length === 0) {
    container.innerHTML = '<p style="font-size:11px;color:#64748b;text-align:center;padding:8px 0">Žádné spoje v příštích 60 min.</p>';
  } else {
    const rows = all.slice(0, 6).map(a => {
      const mins = a.arrival_minutes;
      const minsStr = mins <= 0 ? 'Přijíždí!' : mins + ' min';
      const minsColor = mins <= 0 ? '#34d399' : mins <= 3 ? '#34d399' : mins <= 6 ? '#fbbf24' : '#94a3b8';
      const delayHtml = (a.status === 'DELAYED' && a.delay_minutes > 0.5)
        ? ' <span style="color:#f87171;font-size:9px">+' + Math.round(a.delay_minutes) + '\'</span>' : '';
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 4px;border-bottom:1px solid rgba(51,65,85,0.5)">'
        + '<div style="display:flex;align-items:center;gap:7px">'
        + '<span style="background:#1e293b;color:#fbbf24;font-weight:900;font-size:12px;padding:2px 6px;border-radius:5px;min-width:30px;text-align:center;font-family:monospace">' + (a.route_short_name || a.route_long_name) + '</span>'
        + '<div><div style="font-size:11px;color:#e2e8f0;font-weight:600">' + a.trip_headsign + '</div>'
        + '<div style="font-size:9px;color:' + a.dirColor + ';margin-top:1px">' + a.dirLabel + '</div></div></div>'
        + '<span style="font-weight:900;font-size:14px;color:' + minsColor + ';font-family:monospace;white-space:nowrap">' + minsStr + delayHtml + '</span>'
        + '</div>';
    }).join('');
    const t = new Date().toLocaleTimeString('cs-CZ', { hour:'2-digit', minute:'2-digit' });
    container.innerHTML = '<div style="background:rgba(2,6,23,0.4);border:1px solid rgba(51,65,85,0.4);border-radius:8px;overflow:hidden;margin-bottom:2px">'
      + '<div style="padding:2px 4px">' + rows + '</div>'
      + '<div style="font-size:9px;color:#334155;text-align:right;padding:3px 8px">Aktualizováno ' + t + ' · auto-refresh 30 s</div></div>';
  }
  btn.textContent = '↺ Obnovit'; btn.disabled = false;
  window.depRefreshTimers[key] = setTimeout(() => loadArrivals(key), 30000);
}

function haversineM(la1, ln1, la2, ln2) {
  const R = 6371000, r = d => d * Math.PI / 180;
  const a = Math.sin(r(la2-la1)/2)**2 + Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(r(ln2-ln1)/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function locateMeNow() {
  const btn = document.getElementById('locate-btn');
  const result = document.getElementById('locate-result');
  if (!navigator.geolocation) {
    result.classList.remove('hidden');
    result.innerHTML = '<p style="font-size:11px;color:#f87171;padding:6px">Geolokace není dostupná v tomto prohlížeči.</p>';
    return;
  }
  btn.textContent = '⟳ Hledám polohu…'; btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude:lat, longitude:lng, accuracy } = pos.coords;
      const sorted = STOPS_GEO
        .map(s => ({ ...s, dist: Math.round(haversineM(lat, lng, s.lat, s.lng)) }))
        .sort((a, b) => a.dist - b.dist);
      const rows = sorted.map(s => {
        const wmin = Math.ceil(s.dist / 75);
        const col = s.dist < 200 ? '#34d399' : s.dist < 500 ? '#fbbf24' : '#94a3b8';
        const badge = s.id !== 'home'
          ? '<span style="background:#1e293b;color:#64748b;font-size:9px;padding:1px 5px;border-radius:3px;font-family:monospace;margin-right:5px">' + s.id + '</span>' : '';
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 2px;border-bottom:1px solid rgba(51,65,85,0.3)">'
          + '<div>' + badge
          + '<span style="font-size:11px;color:#e2e8f0;font-weight:600">' + s.name + '</span>'
          + '<span style="font-size:9px;color:#64748b;display:block;margin-top:1px">' + s.dir + (s.lines ? ' · ' + s.lines : '') + '</span></div>'
          + '<div style="text-align:right">'
          + '<span style="font-size:13px;font-weight:900;color:' + col + ';font-family:monospace">' + s.dist + ' m</span>'
          + '<span style="font-size:9px;color:#64748b;display:block">~' + wmin + ' min pěšky</span></div></div>';
      }).join('');
      result.classList.remove('hidden');
      result.innerHTML = '<div style="font-size:10px;color:#334155;padding:2px 0 6px">GPS přesnost ±' + Math.round(accuracy) + ' m</div>' + rows;
      btn.textContent = '📍 Obnovit polohu'; btn.disabled = false;
    },
    err => {
      const msgs = { 1:'Přístup zamítnut – povol polohu v nastavení.', 2:'Poloha není dostupná.', 3:'Časový limit vypršel.' };
      result.classList.remove('hidden');
      result.innerHTML = '<p style="font-size:11px;color:#f87171;padding:6px">' + (msgs[err.code] || 'Chyba geolokace.') + '</p>';
      btn.textContent = '📍 Zjistit polohu'; btn.disabled = false;
    },
    { timeout:10000, enableHighAccuracy:true }
  );
}

function locateMeLagos() {
  const btn = document.getElementById('locate-btn-lagos');
  const result = document.getElementById('locate-result-lagos');
  if (!btn || !result) return;
  btn.textContent = '⏳ Zjišťuji polohu…'; btn.disabled = true;
  if (!navigator.geolocation) {
    result.textContent = 'Geolokace není k dispozici v tomto prohlížeči.';
    result.classList.remove('hidden');
    btn.innerHTML = '<span>📍</span><span>Zobrazit moji polohu v Google Maps</span>';
    btn.disabled = false; return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      const mapsUrl = 'https://www.google.com/maps?q=' + lat + ',' + lng;
      result.innerHTML = '<p class="text-xs text-slate-300 mb-2">📍 Tvoje poloha: <span class="font-mono text-cyan-400">' + lat + ', ' + lng + '</span></p>'
        + '<a href="' + mapsUrl + '" target="_blank" class="text-xs text-cyan-400 underline font-bold">Otevřít v Google Maps ↗</a>';
      result.classList.remove('hidden');
      btn.innerHTML = '<span>📍</span><span>Zobrazit moji polohu v Google Maps</span>';
      btn.disabled = false;
    },
    () => {
      result.textContent = 'Nepodařilo se zjistit polohu. Povol přístup k poloze v nastavení prohlížeče.';
      result.classList.remove('hidden');
      btn.innerHTML = '<span>📍</span><span>Zobrazit moji polohu v Google Maps</span>';
      btn.disabled = false;
    },
    { timeout:10000, maximumAge:60000 }
  );
}

const WMO = {
  icons:  {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',80:'🌦️',81:'🌦️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'},
  labels: {0:'Jasno',1:'Převážně jasno',2:'Polojasno',3:'Zataženo',45:'Mlha',48:'Jinovatka',51:'Mrholení',53:'Mrholení',55:'Mrholení',61:'Slabý déšť',63:'Déšť',65:'Silný déšť',71:'Sněžení',73:'Sněžení',75:'Sněhová bouře',80:'Přeháňky',81:'Přeháňky',82:'Silné přeháňky',95:'Bouřka',96:'Bouřka',99:'Silná bouřka'}
};

async function fetchWeather() {
  try {
    const res = await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=41.15&longitude=-8.61&current=temperature_2m,weathercode,windspeed_10m&daily=temperature_2m_max,temperature_2m_min,weathercode&forecast_days=3&timezone=Europe%2FLisbon',
      { cache: 'no-store' }
    );
    if (!res.ok) throw new Error();
    const { current: c, daily: d } = await res.json();
    const iEl = document.getElementById('weather-icon');
    if (!iEl) return;
    iEl.textContent = WMO.icons[c.weathercode] ?? '🌡️';
    document.getElementById('weather-temp').textContent = Math.round(c.temperature_2m) + '°C';
    document.getElementById('weather-desc').textContent = WMO.labels[c.weathercode] ?? 'Počasí';
    document.getElementById('weather-wind').textContent = Math.round(c.windspeed_10m) + ' km/h';
    [1, 2].forEach(i => {
      document.getElementById('fc-icon-' + i).textContent = WMO.icons[d.weathercode[i]] ?? '🌡️';
      document.getElementById('fc-temp-' + i).textContent =
        Math.round(d.temperature_2m_min[i]) + '–' + Math.round(d.temperature_2m_max[i]) + '°C';
    });
  } catch { /* offline – výchozí hodnoty zůstanou */ }
}

// ===========================
// PORTO – PLACES (ubytování & POI)
// ===========================
const DEFAULT_HOME = {
  name:    'Rua Paulo Gama, 551',
  address: 'Rua Paulo Gama 551, Lordelo do Ouro, Porto',
  lat:     41.15468,
  lng:     -8.65016
};

function loadHome() {
  return {
    name:    localStorage.getItem('porto_home_name')    || DEFAULT_HOME.name,
    address: localStorage.getItem('porto_home_address') || DEFAULT_HOME.address,
    lat:     parseFloat(localStorage.getItem('porto_home_lat'))  || DEFAULT_HOME.lat,
    lng:     parseFloat(localStorage.getItem('porto_home_lng'))  || DEFAULT_HOME.lng
  };
}

function saveHomeSettings() {
  const name    = document.getElementById('modal-home-name').value.trim();
  const address = document.getElementById('modal-home-address').value.trim();
  const lat     = parseFloat(document.getElementById('modal-home-lat').value)  || DEFAULT_HOME.lat;
  const lng     = parseFloat(document.getElementById('modal-home-lng').value)  || DEFAULT_HOME.lng;
  if (!name || !address) return;
  localStorage.setItem('porto_home_name', name);
  localStorage.setItem('porto_home_address', address);
  localStorage.setItem('porto_home_lat', lat);
  localStorage.setItem('porto_home_lng', lng);
  applyPlaces();
  showToast('Ubytování uloženo! 🏠');
}

function resetHomeSettings() {
  ['porto_home_name','porto_home_address','porto_home_lat','porto_home_lng'].forEach(k => localStorage.removeItem(k));
  applyPlaces();
  showToast('Ubytování resetováno.');
}

function loadPois() {
  try { return JSON.parse(localStorage.getItem('porto_pois') || '[]'); } catch { return []; }
}

function savePois(pois) { localStorage.setItem('porto_pois', JSON.stringify(pois)); }

function addPoi() {
  const emoji   = document.getElementById('modal-poi-emoji').value.trim()   || '📍';
  const name    = document.getElementById('modal-poi-name').value.trim();
  const address = document.getElementById('modal-poi-address').value.trim();
  const lat     = parseFloat(document.getElementById('modal-poi-lat').value)  || null;
  const lng     = parseFloat(document.getElementById('modal-poi-lng').value)  || null;
  if (!name || !address) { showToast('Vyplň název a adresu.'); return; }
  const pois = loadPois();
  pois.push({ emoji, name, address, lat, lng });
  savePois(pois);
  ['modal-poi-emoji','modal-poi-name','modal-poi-address','modal-poi-lat','modal-poi-lng','modal-poi-search']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  applyPlaces();
  showToast(emoji + ' ' + name + ' přidáno!');
}

function deletePoi(index) {
  const pois = loadPois();
  pois.splice(index, 1);
  savePois(pois);
  applyPlaces();
}

function applyPlaces() {
  const h = loadHome();
  const pois = loadPois();

  // Sync STOPS_GEO home entry
  const homeStop = STOPS_GEO.find(s => s.id === 'home');
  if (homeStop) { homeStop.name = '🏠 ' + h.name; homeStop.dir = h.address; homeStop.lat = h.lat; homeStop.lng = h.lng; }

  // Rebuild STOPS_GEO poi entries
  const base = STOPS_GEO.filter(s => !s.id.startsWith('poi_'));
  STOPS_GEO.length = 0;
  base.forEach(s => STOPS_GEO.push(s));
  pois.filter(p => p.lat && p.lng).forEach((p, i) => {
    STOPS_GEO.push({ id: 'poi_' + i, name: p.emoji + ' ' + p.name, dir: p.address, lat: p.lat, lng: p.lng, lines: null });
  });

  // Update nearby location selector
  const nearbySel = document.getElementById('nearby-location-select');
  if (nearbySel) {
    const prev = nearbySel.value;
    nearbySel.innerHTML = '<option value="home">🏠 ' + h.name + '</option>'
      + pois.filter(p => p.lat && p.lng).map((p, i) =>
        '<option value="poi_' + i + '">' + p.emoji + ' ' + p.name + '</option>'
      ).join('');
    if ([...nearbySel.options].some(o => o.value === prev)) nearbySel.value = prev;
  }

  // Refresh modal UI if open
  renderPlacesModal();
}

function renderPlacesModal() {
  const h = loadHome();
  const ni  = document.getElementById('modal-home-name');    if (ni)  ni.value  = h.name;
  const ai  = document.getElementById('modal-home-address'); if (ai)  ai.value  = h.address;
  const lti = document.getElementById('modal-home-lat');     if (lti) lti.value = h.lat;
  const lni = document.getElementById('modal-home-lng');     if (lni) lni.value = h.lng;

  const pois = loadPois();
  const list = document.getElementById('modal-poi-list');
  if (!list) return;
  list.innerHTML = pois.length === 0
    ? '<p class="text-xs text-slate-500 text-center py-3">Zatím žádná místa.</p>'
    : pois.map((p, i) =>
      '<div class="flex items-center justify-between p-2 rounded-lg bg-slate-950/40 border border-slate-800/50">'
      + '<div class="truncate mr-2"><span class="text-xs font-bold text-slate-200">' + p.emoji + ' ' + p.name + '</span>'
      + '<span class="text-[10px] text-slate-500 block truncate">' + p.address + '</span></div>'
      + '<button onclick="deletePoi(' + i + ')" class="shrink-0 text-slate-500 hover:text-red-400 text-sm px-2 transition cursor-pointer select-none">✕</button>'
      + '</div>'
    ).join('');
}

function openPlacesModal() {
  renderPlacesModal();
  document.getElementById('places-modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closePlacesModal() {
  document.getElementById('places-modal').classList.add('hidden');
  document.body.style.overflow = '';
}

// ===========================
// PORTO – NOMINATIM GEOCODING
// ===========================
let _nominatimTimer = null;

function nominatimSearch(inputId, resultsId) {
  const query = (document.getElementById(inputId) || {}).value || '';
  const list = document.getElementById(resultsId);
  if (!list) return;
  clearTimeout(_nominatimTimer);
  if (query.trim().length < 3) { list.classList.add('hidden'); list.innerHTML = ''; return; }
  _nominatimTimer = setTimeout(() => {
    list.innerHTML = '<div class="px-3 py-2 text-slate-500 text-xs">Hledám…</div>';
    list.classList.remove('hidden');
    fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(query) + '&format=json&limit=5&addressdetails=1', {
      headers: { 'Accept-Language': 'cs,en' }
    })
      .then(r => r.json())
      .then(data => {
        if (!data.length) { list.innerHTML = '<div class="px-3 py-2 text-slate-500 text-xs">Nic nenalezeno.</div>'; return; }
        list.innerHTML = data.map((item, i) =>
          '<div data-idx="' + i + '" class="px-3 py-2.5 border-b border-slate-700/50 last:border-0 cursor-pointer hover:bg-slate-700 active:bg-slate-600 transition">'
          + '<div class="font-semibold text-slate-100 text-xs">' + (item.name || item.display_name.split(',')[0]) + '</div>'
          + '<div class="text-[10px] text-slate-400 truncate">' + item.display_name + '</div></div>'
        ).join('');
        list.querySelectorAll('[data-idx]').forEach(el => {
          el.addEventListener('click', () => nominatimFill(resultsId, data[parseInt(el.dataset.idx)]));
        });
      })
      .catch(() => { list.innerHTML = '<div class="px-3 py-2 text-red-400 text-xs">Chyba připojení.</div>'; });
  }, 400);
}

function nominatimFill(resultsId, item) {
  const shortName = item.name || item.display_name.split(',')[0];
  const lat = parseFloat(item.lat), lng = parseFloat(item.lon);
  if (resultsId === 'modal-home-results') {
    document.getElementById('modal-home-name').value    = shortName;
    document.getElementById('modal-home-address').value = item.display_name;
    document.getElementById('modal-home-lat').value     = lat;
    document.getElementById('modal-home-lng').value     = lng;
    document.getElementById('modal-home-search').value  = '';
  } else {
    document.getElementById('modal-poi-name').value    = shortName;
    document.getElementById('modal-poi-address').value = item.display_name;
    document.getElementById('modal-poi-lat').value     = lat;
    document.getElementById('modal-poi-lng').value     = lng;
    document.getElementById('modal-poi-search').value  = '';
  }
  const list = document.getElementById(resultsId);
  list.classList.add('hidden'); list.innerHTML = '';
}

document.addEventListener('click', e => {
  ['modal-home-results', 'modal-poi-results'].forEach(id => {
    const list = document.getElementById(id);
    if (list && !list.classList.contains('hidden') && !list.contains(e.target)) {
      const inputId = id.replace('-results', '-search');
      if (e.target.id !== inputId) { list.classList.add('hidden'); list.innerHTML = ''; }
    }
  });
});

// ===========================
// PORTO – NEARBY PLACES (OVERPASS / OSM)
// ===========================
const NEARBY_CFG = {
  supermarket: { tag: '"shop"="supermarket"', label: 'Supermarket', radius: 1000 },
  cafe:        { tag: '"amenity"="cafe"',      label: 'Kavárna',     radius: 600  },
  fast_food:   { tag: '"amenity"="fast_food"', label: 'Fast food',   radius: 600  },
  bar:         { tag: '"amenity"="bar"',        label: 'Bar',         radius: 600  }
};

async function fetchNearby(btn, category) {
  const sel = document.getElementById('nearby-location-select');
  const val = sel ? sel.value : 'home';
  let lat, lng;
  if (val === 'home') {
    const h = loadHome(); lat = h.lat; lng = h.lng;
  } else {
    const idx = parseInt(val.replace('poi_', ''));
    const poi = loadPois()[idx];
    if (!poi || !poi.lat) { showToast('Toto místo nemá souřadnice.'); return; }
    lat = poi.lat; lng = poi.lng;
  }

  document.querySelectorAll('.nearby-cat-btn').forEach(b => b.classList.remove('ring-1', 'ring-yellow-400', 'text-yellow-400'));
  btn.classList.add('ring-1', 'ring-yellow-400', 'text-yellow-400');

  const results = document.getElementById('nearby-results');
  results.innerHTML = '<p class="text-slate-500 text-center py-3 text-xs">Hledám v okolí…</p>';

  const cfg = NEARBY_CFG[category];
  const q = `[out:json][timeout:12];(node[${cfg.tag}](around:${cfg.radius},${lat},${lng});way[${cfg.tag}](around:${cfg.radius},${lat},${lng}););out center 15;`;
  try {
    const res = await fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: q });
    if (!res.ok) throw new Error();
    const data = await res.json();
    const places = data.elements
      .map(el => {
        const elat = el.lat ?? el.center?.lat, elng = el.lon ?? el.center?.lon;
        if (!elat) return null;
        return { name: el.tags?.name || el.tags?.['name:en'] || cfg.label, dist: Math.round(haversineM(lat, lng, elat, elng)), elat, elng };
      })
      .filter(Boolean).sort((a, b) => a.dist - b.dist).slice(0, 10);

    if (!places.length) {
      results.innerHTML = '<p class="text-slate-500 text-center py-3 text-xs">Nic v okolí ' + cfg.radius + ' m nenalezeno.</p>';
      return;
    }
    results.innerHTML = places.map(p =>
      '<div class="flex items-center justify-between p-2 rounded-lg bg-slate-950/40">'
      + '<div class="truncate mr-2">'
      + '<span class="text-slate-100 font-bold text-xs block truncate">' + p.name + '</span>'
      + '<span class="text-slate-500 text-[10px] font-mono">' + p.dist + ' m · ~' + Math.ceil(p.dist / 75) + ' min</span>'
      + '</div>'
      + '<a href="https://www.google.com/maps/search/?api=1&query=' + p.elat + ',' + p.elng + '" target="_blank" rel="noopener" '
      + 'class="shrink-0 bg-slate-700 hover:bg-slate-600 text-yellow-400 text-[10px] px-2.5 py-1.5 rounded-md font-bold transition">Mapa</a>'
      + '</div>'
    ).join('');
  } catch {
    results.innerHTML = '<p class="text-red-400 text-center py-3 text-[11px]">Chyba – zkontroluj připojení.</p>';
  }
}
