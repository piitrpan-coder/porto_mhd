<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cestovní Průvodce</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Průvodce">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .pt-safe { padding-top: calc(20px + env(safe-area-inset-top, 0px)); }
    .pb-safe { padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px)); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .fade-up-2 { animation: fadeUp 0.35s 0.07s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .fade-up-3 { animation: fadeUp 0.35s 0.14s cubic-bezier(0.16, 1, 0.3, 1) both; }
  </style>
</head>
<body class="bg-[#060d18] text-slate-100 min-h-screen">

<div class="w-full max-w-md mx-auto min-h-screen flex flex-col px-4 border-x border-slate-900/60">

  <!-- Header -->
  <header class="pt-safe pb-6">
    <div class="flex items-center space-x-3 mt-2">
      <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-slate-700 to-slate-800 border border-slate-700 flex items-center justify-center shadow-lg">
        <svg class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <div>
        <h1 class="text-lg font-black text-slate-50 tracking-tight">Cestovní Průvodce</h1>
        <p class="text-[11px] text-slate-500 font-medium">Tvůj offline asistent pro každé město</p>
      </div>
    </div>
  </header>

  <!-- Section label -->
  <p class="text-[10px] uppercase tracking-widest text-slate-600 font-bold mb-3 fade-up">Moje cesty</p>

  <!-- City cards -->
  <div class="flex flex-col space-y-3">

    <!-- Porto -->
    <a href="porto.html" class="fade-up block group relative rounded-2xl overflow-hidden shadow-xl active:scale-[0.98] transition-transform duration-150 cursor-pointer">
      <!-- Gradient bg -->
      <div class="absolute inset-0 bg-gradient-to-br from-[#1a1400] via-[#2a1f00] to-[#0f172a]"></div>
      <!-- Yellow glow -->
      <div class="absolute top-0 left-0 w-48 h-48 rounded-full bg-yellow-500/10 blur-3xl -translate-x-12 -translate-y-12"></div>
      <!-- Border -->
      <div class="absolute inset-0 rounded-2xl border border-yellow-500/20 group-hover:border-yellow-500/40 transition-colors"></div>

      <div class="relative p-5 flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <!-- Icon -->
          <div class="w-14 h-14 rounded-xl bg-yellow-500/15 border border-yellow-500/25 flex items-center justify-center shrink-0">
            <svg class="w-8 h-8 text-yellow-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 4h14a2 2 0 012 2v6a5 5 0 01-5 5H8a5 5 0 01-5-5V6a2 2 0 012-2zM9 17v4m6-4v4m-9-2h12M6 8h12"/>
            </svg>
          </div>
          <div>
            <div class="flex items-center space-x-2 mb-0.5">
              <h2 class="text-xl font-black text-slate-50">Porto</h2>
              <span class="text-[10px] bg-yellow-500/20 text-yellow-400 px-1.5 py-0.5 rounded font-bold border border-yellow-500/25">🇵🇹 PT</span>
            </div>
            <p class="text-xs text-slate-400 font-medium">Metro & MHD · Andante wallet</p>
            <div class="flex items-center space-x-2 mt-1.5">
              <span class="text-[10px] bg-slate-800/80 text-slate-400 px-1.5 py-0.5 rounded font-mono">Metro</span>
              <span class="text-[10px] bg-slate-800/80 text-slate-400 px-1.5 py-0.5 rounded font-mono">STCP live</span>
              <span class="text-[10px] bg-slate-800/80 text-slate-400 px-1.5 py-0.5 rounded font-mono">Offline</span>
            </div>
          </div>
        </div>
        <svg class="w-5 h-5 text-yellow-500/60 group-hover:text-yellow-400 group-hover:translate-x-0.5 transition shrink-0 ml-2" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </div>
    </a>

    <!-- Lagos -->
    <a href="lagos.html" class="fade-up-2 block group relative rounded-2xl overflow-hidden shadow-xl active:scale-[0.98] transition-transform duration-150 cursor-pointer">
      <div class="absolute inset-0 bg-gradient-to-br from-[#001a20] via-[#002535] to-[#0f172a]"></div>
      <div class="absolute top-0 right-0 w-48 h-48 rounded-full bg-cyan-500/10 blur-3xl translate-x-12 -translate-y-12"></div>
      <div class="absolute inset-0 rounded-2xl border border-cyan-500/20 group-hover:border-cyan-500/40 transition-colors"></div>

      <div class="relative p-5 flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <div class="w-14 h-14 rounded-xl bg-cyan-500/15 border border-cyan-500/25 flex items-center justify-center shrink-0">
            <svg class="w-8 h-8 text-cyan-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1M4.22 4.22l.7.7m12.66 12.66l.7.7M1 12h1m20 0h1M4.22 19.78l.7-.7M18.36 5.64l.7-.7M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          </div>
          <div>
            <div class="flex items-center space-x-2 mb-0.5">
              <h2 class="text-xl font-black text-slate-50">Lagos</h2>
              <span class="text-[10px] bg-cyan-500/20 text-cyan-400 px-1.5 py-0.5 rounded font-bold border border-cyan-500/25">🇵🇹 Algarve</span>
            </div>
            <p class="text-xs text-slate-400 font-medium">Pláže & doprava · Offline mapa</p>
            <div class="flex items-center space-x-2 mt-1.5">
              <span class="text-[10px] bg-slate-800/80 text-slate-400 px-1.5 py-0.5 rounded font-mono">6 plání</span>
              <span class="text-[10px] bg-slate-800/80 text-slate-400 px-1.5 py-0.5 rounded font-mono">EVA bus</span>
              <span class="text-[10px] bg-slate-800/80 text-slate-400 px-1.5 py-0.5 rounded font-mono">Trajekt</span>
            </div>
          </div>
        </div>
        <svg class="w-5 h-5 text-cyan-500/60 group-hover:text-cyan-400 group-hover:translate-x-0.5 transition shrink-0 ml-2" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </div>
    </a>

    <!-- Add city placeholder -->
    <button class="fade-up-3 w-full group relative rounded-2xl border border-dashed border-slate-700 hover:border-slate-600 active:scale-[0.98] transition-all duration-150 cursor-pointer p-5 flex items-center space-x-4">
      <div class="w-14 h-14 rounded-xl bg-slate-800/60 border border-slate-700 flex items-center justify-center shrink-0 group-hover:bg-slate-800 transition-colors">
        <svg class="w-6 h-6 text-slate-500 group-hover:text-slate-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
      </div>
      <div class="text-left">
        <p class="text-sm font-bold text-slate-500 group-hover:text-slate-400 transition-colors">Přidat město</p>
        <p class="text-[11px] text-slate-600 mt-0.5">Řekni Claudovi kam cestuješ</p>
      </div>
    </button>

  </div>

  <!-- Footer -->
  <div class="pb-safe mt-auto pt-8 text-center">
    <p class="text-[10px] text-slate-700 font-medium">Vše běží offline · data v localStorage</p>
  </div>

</div>

</body>
</html>
